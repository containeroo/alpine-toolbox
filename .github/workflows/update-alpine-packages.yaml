name: Update Alpine packages

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Alpine package pins
        run: ./.github/scripts/update-alpine-package-versions.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/update-alpine-packages
          delete-branch: true
          commit-message: "chore: update Alpine package versions"
          title: "chore: update Alpine package versions"
          body: |
            Updates pinned Alpine package versions from the official Alpine package indexes.

            This PR is generated by the scheduled Alpine package updater workflow.
          labels: dependency
